description: 'Context: agent-facing onboarding guidance has drifted across repo docs, bundled templates, init scaffolding, and docs:sync. Problem: new projects and upgraded projects receive contradictory instructions around wu:prep vs wu:done, cloud activation, config nesting, and command discovery; init still emits stale hardcoded markdown in places. Solution: make the repo docs the canonical source, sync bundled templates from them, update init/docs-sync to consume the bundled templates consistently, and add tests that catch guidance drift.'
acceptance:
  - Starting-prompt, agent-safety-card, quick-ref, and LUMENFLOW guidance consistently reflect wu:prep then wu:done, explicit-only cloud activation, correct requireRemote nesting, and public CLI vs repo-only script discovery.
  - Init scaffolding sources LUMENFLOW and scaffolded onboarding docs from bundled templates instead of stale hardcoded markdown where applicable.
  - Bundled onboarding templates cover the docs that init and docs:sync are responsible for, and docs:sync refreshes the full supported onboarding set with accurate skip/force messaging.
  - CLI tests cover init/template parity, docs-sync coverage, and content contracts for the corrected onboarding guidance.
