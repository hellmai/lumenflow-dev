description: 'Context: a claimed worktree WU can have canonical claim metadata on origin/main and in
  its worktree while a local main checkout remains stale. Problem: validateWUEditable() reads the
  local WU YAML first to choose edit mode, so a stale local ready copy can make wu:edit treat an
  in_progress worktree WU as ready. That lets the spec edit go through the micro-worktree path on
  main, which can drop claim metadata, create wu-events rebase conflicts in the worktree, and break
  wu:prep/wu:done until recovery commands repair state. Solution: resolve edit mode from
  authoritative claimed state instead of stale local main, or fail safely when local and
  remote/worktree state disagree, and add regression coverage for stale-main claimed-WU edits.'
acceptance:
  - wu:edit does not choose ready/micro-worktree mode for a WU that is claimed in_progress on
    origin/main or in its worktree when local main is stale
  - If local and authoritative WU state disagree, wu:edit fails safely with remediation instead of
    rewriting runtime claim metadata
  - Editing notes on a claimed worktree WU from the correct worktree preserves claimed_mode,
    claimed_at, session_id, worktree_path, and status
  - Regression tests cover the stale-local-main scenario and prevent claim metadata loss
