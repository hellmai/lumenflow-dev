description: Agents and operators can mistake claim-time auto-brief evidence or wu:brief
  --evidence-only for a full handoff prompt. Fix the UX and metadata so auto-claim evidence is
  explicitly labeled as evidence-only, wu-events encode the brief output mode, and
  remediation/guidance says to run full wu:brief with a client when a real handoff prompt is needed.
acceptance:
  - wu:claim auto-brief success output explicitly says evidence-only or no handoff prompt was
    generated
  - wu:brief evidence stores an explicit mode that distinguishes prompt generation from
    evidence-only recording
  - wu-event helpers can read the stored brief mode for downstream policy or UX checks
  - remediation or guidance text for full handoff prompts explicitly points to wu:brief --client
    <client> instead of implying evidence-only is equivalent
