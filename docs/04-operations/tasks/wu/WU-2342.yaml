description: 'Context: WU-2341 allowed wu:done session handoff when any valid wu:prep checkpoint existed, but both the ownership check in wu-done.ts and the gate-skip path in wu-done-gates.ts call canSkipGates() with currentHeadSha undefined. Problem: a stale prep checkpoint can still authorize cross-session completion or skip gates after new commits land on the worktree branch. Solution: resolve the current worktree HEAD SHA and require checkpoint SHA match before treating prep as an authorized handoff or skipping gates, with regression tests for stale-checkpoint mismatch and normal prep-to-done handoff.'
acceptance:
  - wu:done only accepts wu:prep session handoff when the prep checkpoint matches the current worktree HEAD
  - checkpoint-based gate skipping in wu:done refuses stale checkpoints after new commits
  - normal wu:prep in session A then wu:done in session B still succeeds when the worktree HEAD is unchanged
  - regression tests cover both the ownership path and the executeGates checkpoint-skip path
