description: Move provider-aware routing for channel:send/channel:receive into Sidekick pack so
  cloud no longer intercepts for provider dispatch. Pack keeps local storage behavior when provider
  is absent and delegates to registered transport when provider is present.
acceptance:
  - channel:send/channel:receive route via registered transport when provider is present
  - channel:send/channel:receive preserve existing local .sidekick behavior when provider is absent
  - provider present without workspace_id returns WORKSPACE_CONTEXT_REQUIRED
  - provider present without registered transport returns INTEGRATION_PROVIDER_NOT_REGISTERED
  - runtime-scoped registry prevents cross-test global state leakage
