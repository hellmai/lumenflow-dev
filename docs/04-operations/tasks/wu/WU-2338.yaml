description: 'executeAlreadyMergedFinalize uses relative WU_PATHS inside withMicroWorktree callback.
  WUTransaction.commit() resolves relative paths from process.cwd() (main checkout) instead of the
  micro-worktree in /tmp. This writes metadata directly to main working tree, the micro-worktree
  commit fails, and main is left dirty. The fix exists: resolveWorktreeMetadataPaths() from WU-1563
  produces absolute paths but was not used in the WU-2211 already-merged path.'
acceptance:
  - wu:done --already-merged writes metadata files inside micro-worktree, not main checkout
  - Existing wu-done-already-merged tests pass
  - New test confirms paths passed to transaction are absolute micro-worktree paths
