    .lumenflow.lane-inference.yaml sub-lanes are out of sync
  - error output includes copy-paste remediation commands and identifies missing/extra sub-lanes by
    parent
  - automated tests cover drift detection for create/edit/validate/lock flows and pass
  - operator-facing docs for lane commands are updated to reflect actual flags and drift remediation
    flow
