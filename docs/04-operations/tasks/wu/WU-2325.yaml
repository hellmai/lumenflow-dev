description: 'Context: Teams update software_delivery.lanes.definitions in workspace.yaml but lane
  validators still read stale .lumenflow.lane-inference.yaml entries. Problem: agents cannot
  claim/use new sub-lanes and see outdated "Valid sub-lanes" guidance. Solution: add deterministic
  drift detection and a single remediation path so lane:create/lane:edit/lane:validate/lane:lock
  fail fast with actionable sync instructions.'
acceptance:
