description: 'Context: lane existence and sub-lane guidance currently depend on both workspace.yaml
  and .lumenflow.lane-inference.yaml, which drifts in active projects. Problem: valid lanes in
  workspace definitions can be rejected when inference taxonomy is stale, blocking agents and
  creating contradictory guidance. Solution: move lane existence/validation truth to workspace.yaml,
  treat inference taxonomy as derived metadata for suggestion workflows, and preserve deterministic
  validation behavior with explicit sync/regen guidance.'
acceptance:
  - lane validation and claim-time lane checks accept lanes that are valid in workspace.yaml even
    when inference metadata is stale
  - inference taxonomy is treated as derived data for lane suggestion/classification and no longer
    blocks valid workspace-defined lanes
  - automated tests cover workspace-authoritative validation paths and stale-taxonomy regressions
  - internal onboarding docs and Starlight reference docs explain source-of-truth rules and
    regeneration workflow
