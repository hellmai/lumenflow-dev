description: 'Context: The v3.11.0 tag published to npm and GitHub, but the Starlight docs workflow failed. Problem: apps/docs/src/content/docs/getting-started/upgrade.mdx contains malformed MDX in a <Steps> block, so tagged docs builds break and releases do not fully ship. Solution: repair the MDX structure, validate the docs build locally, and cut a follow-up patch release so the docs deployment succeeds.'
acceptance:
