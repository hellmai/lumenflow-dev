description: 'Two related issues: (1) Skip-gates audit writer (wu-done.ts:594) writes to .log without gate field, but reader (metrics-snapshot.ts:51,222) expects .ndjson with gate field — CFR always computes as 0%. (2) DORA metrics computed by metrics:snapshot are never emitted as telemetry records, so the cloud sync pipeline has nothing to pick up — Cloud DORA dashboard shows empty state.'
acceptance:
  - Skip-gates writer and reader use same file path and schema
  - CFR calculation correctly counts skip-gates entries
  - metrics:snapshot emits dora.* telemetry records to NDJSON
  - Existing syncNdjsonTelemetryToCloud picks up DORA records
