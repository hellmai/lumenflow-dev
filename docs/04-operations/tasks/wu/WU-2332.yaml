description: 'Context: lane lifecycle still carries a second lane artifact,
  .lumenflow.lane-inference.yaml, even though workspace.yaml is already the source of truth for lane
  validation. Problem: that second artifact adds drift, confusing recovery paths, and stale docs for
  new consumers and future upgrades. Solution: remove lane-inference.yaml from workflow mechanics,
  read lane information directly from workspace.yaml, and update commands/docs/tests so fresh
  installs and future upgrades follow one canonical lane path.'
acceptance:
  - Lane lifecycle commands no longer require or generate .lumenflow.lane-inference.yaml.
  - lane:create and lane:edit operate from workspace.yaml alone.
  - Lane suggestion/inference surfaces no longer depend on .lumenflow.lane-inference.yaml.
  - Docs and tests reflect workspace.yaml as the sole lane artifact for new installs and future
    upgrades.
