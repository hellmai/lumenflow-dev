description: "Context: recent agent sessions on live WUs still followed contradictory LumenFlow
  guidance: they used git stash on main to test pre-existing gate failures, ran repo-wide pnpm
  format after gates had already identified specific files, generated a full wu:brief prompt while
  self-implementing, and got a misleading 'Ready to claim' summary from wu:edit on an already
  in_progress worktree WU. Problem: agent-facing prompts/templates and wu:edit output still contain
  workflow advice that conflicts with worktree discipline and claim-state reality, which leads
  agents into dirty-main conflicts, unrelated churn, and avoidable lifecycle confusion. Solution:
  align prompt/template guidance and wu:edit readiness messaging with current worktree rules so
  agents are steered toward targeted fixes, evidence-only self-implementation, and state-aware next
  steps."
acceptance:
  - Agent-facing onboarding/generated prompts no longer recommend git stash/git stash pop on main to
    verify pre-existing gate failures
  - Quick-fix guidance no longer defaults to repo-wide pnpm format when gate output identifies exact
    files to format
  - Self-implementation guidance consistently prefers wu:brief --evidence-only and avoids
    delegation-style prompt generation for in-session work
  - wu:edit readiness/output is lifecycle-aware and never tells an already in_progress WU to run
    pnpm wu:claim
  - Regression tests cover prompt/template guidance and wu:edit readiness output for claimed WUs
