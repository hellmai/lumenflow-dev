description: Shell hooks and pre-commit.mjs contain hardcoded docs/04-operations/tasks/wu paths that bypass the path-literal-guard (which only covers .ts files). Additionally, validate-worktree-path.sh and the template enforce-worktree.sh have an allowlist ordering bug where the allowlist check runs AFTER the worktree-exists block, making .claude/* writes impossible when worktrees exist.
acceptance:
  - No hardcoded docs/04-operations/tasks/wu paths in shell hooks or .mjs scripts
  - Allowlist check runs BEFORE worktree-exists block in both deployed and template hooks
  - Hooks read wuDir from workspace.yaml with fallback to LUMENFLOW_PATHS constants
  - All existing hook tests pass
