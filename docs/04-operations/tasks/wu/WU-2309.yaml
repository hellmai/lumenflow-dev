description: 'Context: wu:brief guidance currently forces TDD in cases like prompt/content YAML and
  some UI presentation work, and lane-specific Intelligence guidance hardcodes PatientPath-style
  prompt eval commands. Problem: this couples core policy to domain specifics and causes
  inappropriate test directives for non-code changes. Solution: introduce profile-aware non-code
  handling in policy-based test guidance, keep core generic, move domain-specific guidance to
  template/config surfaces, and document the configuration model for internal and Starlight docs.'
acceptance:
  - Policy-based test guidance supports non-code structured content flows (YAML/JSON/Markdown)
    without forcing TDD when no runtime logic is implied.
  - Hardcoded Intelligence lane prompt-eval guidance is removed from code paths that generate
    wu:brief output; domain-specific guidance is configurable via templates/config.
  - wu:brief output remains generic by default while allowing project-specific overrides through
    template conditions and client/lane config.
  - Automated tests cover new profile-aware guidance behavior and prevent regression for existing
    TDD/test-after/none modes.
  - Internal docs and Starlight docs are updated to describe the generic core model plus
    project-level domain customization points.
