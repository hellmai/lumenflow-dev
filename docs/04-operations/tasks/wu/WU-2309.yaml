description: "Context: wu:brief --evidence-only can print 'Recorded wu:brief evidence' even when
  context gating skips the write. Problem: users receive a false-success signal and may bypass with
  --force unnecessarily. Solution: return explicit record outcome from evidence writer and emit
  mode-aware output (recorded vs skipped, with actionable context)."
acceptance:
  - When evidence is skipped by context gate, wu:brief --evidence-only prints a skip message instead
    of 'Recorded'.
  - When evidence is written, wu:brief --evidence-only continues to print a successful recording
    message.
  - Add/update unit tests covering both recorded and skipped evidence-only outcomes.
