description: "Context: WU-2335 fixed UI-specific verification guidance ordering in wu:brief, but
  Cloud prompts still emit later blanket policy summaries for UI-classified WUs. Problem: UI work
  can correctly say 'Prefer user-outcome verification over brittle DOM assertions' and then later
  still say 'TDD: Failing test first' and 'Testing: tdd', which pushes agents back toward brittle UI
  component TDD. Solution: make the core prompt policy summary sections domain-aware so
  UI-classified work does not restate runtime-style TDD mandates in Mandatory Standards or You will
  be judged by, while preserving strong TDD guidance for runtime/backend work."
acceptance:
  - UI-classified feature/bug WUs generated via wu:brief do not restate blanket TDD mandates in
    Mandatory Standards when the effective guidance is behavior-focused UI verification
  - "UI-classified feature/bug WUs generated via wu:brief do not show 'Testing: tdd' in You will be
    judged by when the work should be validated via fit-for-surface UI verification"
  - Runtime/backend feature WUs still show strong TDD-oriented policy summaries where appropriate
  - Automated regression coverage proves the core prompt generator behavior for both UI-classified
    and runtime/backend WUs
