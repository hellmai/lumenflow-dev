description: plan:create only generates blank templates. Add a --from <path> option that reads
  content from an external file (e.g. ~/.claude/plans/my-plan.md) and writes it into the repo plans
  directory instead of the blank template. This enables importing Claude-generated plans or any
  external plan file into the repo in one step.
acceptance:
  - plan:create --id INIT-XX --title T --from /path/to/external.md copies external file content into
    repo plansDir
  - plan:create without --from still generates blank template (backward compatible)
  - --from validates source file exists and is .md
  - 'Unit tests cover --from path: content copy, missing file error, non-.md rejection'
