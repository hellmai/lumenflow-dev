description: 'Two related bugs from March 7 2026 agent transcripts. (1) wu:done CLAIM OWNERSHIP
  VIOLATION on normal wu:prep to wu:done handoff: wu:prep runs in worktree session, wu:done runs
  from main in different session. This is the documented happy path but triggers ownership error
  requiring --force. wu:done should recognize wu:prep checkpoint as authorized handoff. (2)
  lane:edit micro-worktree pushes to origin/main, then worktree merge creates predictable JSONL
  conflicts in wu-events.jsonl. JSONL is append-only so conflicts should be auto-resolvable.'
acceptance:
  - wu:done accepts wu:prep checkpoint as session handoff proof without requiring --force
  - lane:edit micro-worktree merges into worktrees do not produce JSONL conflicts or conflicts are
    auto-resolved
  - Regression tests cover wu:prep session A then wu:done session B scenario
  - Regression tests cover lane:edit push followed by worktree merge of origin/main
