description: 'Context: v3.12.0 still drops repeated --phase values in initiative:create despite
  prior WU-2243/WU-2246 fixes. Problem: createWUParser returns long-flag keys by default, so custom
  INITIATIVE_CREATE_OPTIONS names are not guaranteed; initiative-create lost phase persistence and
  emitted misleading completeness warnings in the cloud runtime path. Solution: normalize explicit
  option names in createWUParser, update initiative-create to consume canonical initiative option
  keys, and add regression coverage for parser normalization plus initiative:create
  description/phase handling.'
acceptance:
  - initiative:create --phase persists phase objects into created YAML and does not warn that phases
    are missing when phases were provided
  - createWUParser exposes canonical explicit option names for initiative:create custom options even
    when the long flag name differs
  - Regression tests cover parser normalization and initiative:create description/phase handling
