description: 'Context: LumenFlow docs and constraints require two-step completion (wu:prep from worktree, then wu:done from main), but wu:claim messaging still teaches a direct gates -> wu:done path in some flows. Problem: agents follow tool-emitted guidance first, causing wrong-location errors, skipped prep semantics, and avoidable recovery thrash. Solution: update wu:claim guidance surfaces (worktree and branch-pr flows) to consistently direct wu:prep first, then explicit copy-paste wu:done from prep output, and add regression tests so this contract cannot drift.'
acceptance:
  - Worktree-mode wu:claim output instructs wu:prep before wu:done and no longer suggests direct gates -> wu:done completion
  - Branch-pr-mode wu:claim output reflects the correct completion sequence for that mode without contradicting wu:prep semantics
  - Guidance text is internally consistent with wu:prep/wu:done CLI help and troubleshooting docs references
  - Automated tests fail if wu:claim output regresses to direct wu:done guidance
  - No behavioral change to merge/stamp execution logic beyond messaging and guidance
