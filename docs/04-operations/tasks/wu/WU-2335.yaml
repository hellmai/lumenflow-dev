description: 'Context: wu:brief is still too easy for agents to interpret as blanket TDD guidance, especially on UI-classified feature/bug WUs where generic methodology text appears ahead of WU-specific verification and the default methodology templates only exclude type=ui instead of actual UI classification. Problem: this produces prescriptive engineering advice in a vendor-agnostic system, encourages brittle UI test-first behavior, and buries the concrete verification requirements declared on the WU itself. Solution: tighten prompt precedence so WU-declared verification is surfaced first, ensure default methodology directives do not attach to UI-classified work, and update default framework wording/templates so the guidance stays high-quality and consumer-overridable rather than dogmatic.'
acceptance:
  - UI-classified feature/bug WUs generated via wu:brief do not include default TDD/test-after methodology directives unless a consumer override explicitly adds them.
  - wu:brief prompt output surfaces WU-declared required verification before generic verification strategy guidance so agents see concrete required unit/e2e/manual checks first.
  - Default framework docs/templates describe verification strategy as fit-for-surface guidance, scoping TDD language to runtime logic and avoiding blanket UI prescriptions while remaining vendor-agnostic.
  - Existing consumer template override points remain intact; projects can still replace verification guidance through template files without changing core code.
  - Automated regression coverage proves the default prompt behavior for UI-classified work and the verification-section ordering.
