description: 'Context: CLI worktrees can run against a dist layout that resolves template lookup through the main checkout. Problem: when a branch adds or changes bundled onboarding templates, init scaffolding and the onboarding smoke test can fail in the worktree with template-not-found errors even though the branch templates exist. Solution: make template resolution branch-local and worktree-safe, then add regression coverage for symlinked dist/template lookup so worktree gates do not depend on main checkout templates.'
acceptance:
  - Init scaffolding resolves bundled templates from the active branch package when dist is symlinked or otherwise shared from main.
  - Onboarding smoke tests pass in a worktree when branch-only onboarding templates exist without copying those templates into main.
  - Regression tests cover symlinked dist/template lookup and prevent silent fallback to main checkout templates.
