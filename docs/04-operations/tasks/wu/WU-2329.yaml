description: "Context: wu:brief still hardcodes testing and design-process guidance in TypeScript, which makes consumer repos inherit LumenFlow's default engineering workflow even when they need lane-specific or domain-specific verification guidance. Problem: the existing template manifest and client overrides do not control the canonical verification/process copy, UI feature work still falls through to backend-style TDD wording, and the brief does not clearly separate WU-required verification paths from recommended strategy guidance. Solution: expose richer resolved lane/work/policy context to template composition, move verification/process guidance selection onto manifest-driven templates with safe code fallbacks, and render WU-declared verification requirements explicitly so consumers can configure their own flow without forking the command."
acceptance:
  - wu:brief prompt assembly supports template-driven verification/process sections using resolved policy, lane, and work-classification context instead of treating hardcoded TypeScript prose as canonical.
  - Template conditions can target lane/work/policy context needed for consumer overrides, including lane parent and UI/structured-content style classification.
  - Generated briefs separate WU-declared required verification from recommended verification strategy so required unit/e2e/manual paths are explicit in the output.
  - Default brief output no longer forces backend-style TDD wording for UI-classified feature work; the rendered verification guidance is lane/domain-aware and overridable via templates.
  - Core and CLI tests cover the new context, template composition behavior, and regression cases for default fallback output.
