description: 'Context: wu:infer-lane can return the first configured lane when code paths and description provide no meaningful signal. Problem: lane inference sorts zero-score lanes and, with a zero threshold, returns the first definition instead of a real fallback or no-confident-match outcome; in consumer repos this can look like a persistent bias toward Experience: Web. Solution: make inferSubLane treat zero-signal results as no confident match, return a stable fallback instead of the first lane, and add regression coverage for zero-signal and path-driven cases.'
acceptance:
  - wu:infer-lane does not return the first configured lane when all candidate lanes score zero
  - low-signal or zero-signal inputs return a stable fallback result instead of an arbitrary configured lane
  - strong path-driven matches still resolve to the expected lane
  - regression tests cover zero-signal fallback and representative positive matches
