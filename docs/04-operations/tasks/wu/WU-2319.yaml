description: >-
  Context: Control-plane approval workflows need client-side request/review/list wrappers while
  preserving local completion governance.

  Problem: There is no thin CLI/API contract bridge for approval operations in the control-plane
  sync interface.

  Solution: Add optional approval methods to sync-port/http adapter and expose approval CLI commands
  aligned with existing WU escalation behavior.
acceptance:
  - Control-plane sync contracts include optional requestApproval, resolveApproval, and
    listApprovals methods without breaking existing consumers.
  - HTTP control-plane adapter supports approval method calls with clear failure handling.
  - approval:request, approval:review, and approval:list commands are registered and provide usable
    --help output.
  - Existing local WU escalation and wu:done approval-gate behavior remains unchanged.
  - Documentation is updated for approval CLI/API usage and command reference entries.
  - Documentation changes are made in source docs files (apps/docs/src/content/docs/** and
    docs/04-operations/**), not generated output artifacts.
